<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College of Applied Science Navbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Importing Open Sans for the Navbar -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Scoped font for the navbar */
        .nav-font {
            font-family: 'Open Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Navbar Code Starts Here -->
    <!-- Increased py-4 to py-8 for taller navbar -->
    <!-- main/navbar.html -->
<nav class="bg-[#1a2236] text-white px-6 py-6 md:py-6 shadow-md">
    <div class="flex flex-col md:flex-row items-center justify-between gap-4 md:gap-0">

        <!-- Logo Section: Leftmost -->
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-[#eab308] rounded-full flex items-center justify-center text-[#1a2236] font-bold text-2xl">
                C
            </div>
            <div class="flex flex-col">
                <h1 class="text-lg md:text-lg font-bold tracking-wide leading-tight">COLLEGE OF APPLIED SCIENCE</h1>
                <span class="text-[10px] md:text-[10px] text-gray-400 tracking-widest uppercase">Excellence in Education</span>
            </div>
        </div>

        <!-- Navigation Links: Keep position same -->
        <div class="hidden md:flex items-center space-x-6 text-sm font-semibold tracking-wide">
           <a href="{% url 'home' %}"
   class="relative px-4 py-2 text-white hover:text-[#eab308] transition-colors
   {% if request.resolver_match.url_name == 'home' %}
     after:absolute after:left-0 after:-bottom-1 after:w-full after:h-[3px] after:bg-[#eab308]
   {% endif %}">
   HOME
</a>


            <a href="{% url 'about' %}"
   class="relative px-4 py-2 text-white hover:text-[#eab308] transition-colors
   {% if request.resolver_match.url_name == 'about' %}
     after:absolute after:left-0 after:-bottom-1 after:w-full after:h-[3px] after:bg-[#eab308]
   {% endif %}">
   ABOUT
</a>


            <a href="{% url 'academics' %}"
   class="relative px-4 py-2 text-white hover:text-[#eab308] transition-colors
   {% if request.resolver_match.url_name == 'academics' %}
     after:absolute after:left-0 after:-bottom-1 after:w-full after:h-[3px] after:bg-[#eab308]
   {% endif %}">
   ACADEMICS
</a>

            <a href="{% url 'admissions' %}"
   class="relative px-4 py-2 text-white hover:text-[#eab308] transition-colors
   {% if request.resolver_match.url_name == 'admissions' %}
     after:absolute after:left-0 after:-bottom-1 after:w-full after:h-[3px] after:bg-[#eab308]
   {% endif %}">
   ADMISSIONS
</a>


            <a href="{% url 'departments' %}"
   class="relative px-4 py-2 text-white hover:text-[#eab308] transition-colors
   {% if request.resolver_match.url_name == 'departments' %}
     after:absolute after:left-0 after:-bottom-1 after:w-full after:h-[3px] after:bg-[#eab308]
   {% endif %}">
   DEPARTMENTS
</a>


            <a href="{% url 'placement' %}"
   class="relative px-4 py-2 text-white hover:text-[#eab308] transition-colors
   {% if request.resolver_match.url_name == 'placement' %}
     after:absolute after:left-0 after:-bottom-1 after:w-full after:h-[3px] after:bg-[#eab308]
   {% endif %}">
   PLACEMENTS
</a>


            <a href="{% url 'gallery' %}"
   class="relative px-4 py-2 text-white hover:text-[#eab308] transition-colors
   {% if request.resolver_match.url_name == 'gallery' %}
     after:absolute after:left-0 after:-bottom-1 after:w-full after:h-[3px] after:bg-[#eab308]
   {% endif %}">
   GALLERY
</a>


            <a href="/contact"
   class="bg-yellow-400 hover:bg-yellow-500 text-black font-semibold px-5 py-2 rounded-full transition">
  Contact Us
</a>


            
        </div>

      
    </div>
</nav>

    <!-- Navbar Code Ends Here -->

</body>
</html>
