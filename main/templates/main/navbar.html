{% load static %}
<!-- navbar.html — Django partial, no DOCTYPE/head/body -->

<style>
    /* ── Navbar Base ── */
    .site-nav {
        background-color: #1a2b42;
        color: #fff;
        padding: 14px 24px;
        border-bottom: 3px solid #eab308;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        position: relative;
        z-index: 1000;
        font-family: 'Open Sans', 'Segoe UI', sans-serif;
    }

    .nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        gap: 16px;
    }

    /* ── Brand / Logo ── */
    .nav-brand {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
        text-decoration: none;
        color: #fff;
    }

    .nav-brand img {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .nav-brand-text h1 {
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.4px;
        line-height: 1.2;
        color: #fff;
    }

    .nav-brand-text span {
        font-size: 9.5px;
        color: #9ca3af;
        letter-spacing: 2px;
        text-transform: uppercase;
        display: block;
    }


    /* ── Desktop Links ── */
    .nav-links {
        display: flex;
        align-items: center;
        gap: 4px;
        flex: 1;
        justify-content: center;
        flex-wrap: nowrap;
    }

    .nav-links a {
        color: #fff;
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
        padding: 10px 12px;
        border-radius: 4px;
        transition: color 0.2s, background 0.2s;
        white-space: nowrap;
        position: relative;
    }

    .nav-links a:hover {
        color: #eab308;
    }

    .nav-links a.nav-active {
        color: #eab308;
    }

    .nav-links a.nav-active::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 100%;
        height: 3px;
        background: #eab308;
        border-radius: 2px;
    }

    .nav-links a.nav-contact-btn {
        background: #eab308;
        color: #1a2b42;
        font-weight: 700;
        padding: 10px 20px;
        border-radius: 50px;
        font-size: 12px;
    }

    .nav-links a.nav-contact-btn:hover {
        background: #fff;
        color: #1a2b42;
    }

    /* ── Hamburger Button ── */
    .nav-hamburger {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px;
        color: #fff;
        flex-shrink: 0;
        transition: color 0.2s;
    }

    .nav-hamburger:hover {
        color: #eab308;
    }

    .nav-hamburger svg {
        width: 26px;
        height: 26px;
        display: block;
    }

    /* ── Mobile Dropdown ── */
    .nav-mobile-menu {
        display: none;
        flex-direction: column;
        background: #1a2236;
        border-top: 1px solid rgba(255,255,255,0.08);
        padding: 8px 0 16px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .nav-mobile-menu.is-open {
        display: flex;
    }

    .nav-mobile-menu a {
        color: #fff;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.5px;
        padding: 12px 24px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        transition: color 0.2s, background 0.2s;
        display: block;
    }

    .nav-mobile-menu a:hover {
        color: #eab308;
        background: rgba(234,179,8,0.06);
    }

    .nav-mobile-menu a.nav-active {
        color: #eab308;
    }

    .nav-mobile-menu a.nav-contact-btn {
        margin: 12px 24px 0;
        background: #eab308;
        color: #1a2b42;
        font-weight: 700;
        text-align: center;
        border-radius: 50px;
        border-bottom: none;
        padding: 12px 24px;
    }

    .nav-mobile-menu a.nav-contact-btn:hover {
        background: #fff;
    }

    /* ── Responsive: hide desktop links, show hamburger on mobile ── */
    @media (max-width: 768px) {
        .nav-links {
            display: none;
        }

        .nav-hamburger {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-brand-text h1 {
            font-size: 11px;
        }
    }

    @media (min-width: 769px) {
        .nav-mobile-menu {
            display: none !important;
        }
    }
</style>

<nav class="site-nav">
    <div class="nav-inner">

        <!-- LEFT: EMD Logo + Name -->
        <a href="{% url 'home' %}" class="nav-brand">
            <img src="{% static 'main/images/emd_logo.jpeg' %}" alt="Electronics Manpower Development Logo">
            <div class="nav-brand-text">
                <h1>COLLEGE OF APPLIED SCIENCE</h1>
                <span>Excellence in Education</span>
            </div>
        </a>

        <!-- CENTER: Desktop Nav Links -->
        <div class="nav-links">
            <a href="{% url 'home' %}" {% if request.resolver_match.url_name == 'home' %}class="nav-active"{% endif %}>HOME</a>
            <a href="{% url 'about' %}" {% if request.resolver_match.url_name == 'about' %}class="nav-active"{% endif %}>ABOUT</a>
            <a href="{% url 'academics' %}" {% if request.resolver_match.url_name == 'academics' %}class="nav-active"{% endif %}>ACADEMICS</a>
            <a href="{% url 'admissions' %}" {% if request.resolver_match.url_name == 'admissions' %}class="nav-active"{% endif %}>ADMISSIONS</a>
            <a href="{% url 'departments' %}" {% if request.resolver_match.url_name == 'departments' %}class="nav-active"{% endif %}>DEPARTMENTS</a>
            <a href="{% url 'placement' %}" {% if request.resolver_match.url_name == 'placement' %}class="nav-active"{% endif %}>PLACEMENTS</a>
            <a href="{% url 'gallery' %}" {% if request.resolver_match.url_name == 'gallery' %}class="nav-active"{% endif %}>GALLERY</a>
            <a href="{% url 'students_corner' %}" {% if request.resolver_match.url_name == 'students_corner' %}class="nav-active"{% endif %}>STUDENTS CORNER</a>
            <a href="{% url 'iqac' %}" {% if request.resolver_match.url_name == 'iqac' %}class="nav-active"{% endif %}>IQAC</a>
            <a href="{% url 'contact' %}" class="nav-contact-btn">Contact Us</a>
        </div>



        <!-- Hamburger Button (Mobile only) -->
        <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu" aria-expanded="false" onclick="toggleNavMenu()">
            <svg id="navIconOpen" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            <svg id="navIconClose" style="display:none;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>

    </div>

    <!-- Mobile Dropdown Menu -->
    <div class="nav-mobile-menu" id="navMobileMenu">
        <a href="{% url 'home' %}" {% if request.resolver_match.url_name == 'home' %}class="nav-active"{% endif %}>HOME</a>
        <a href="{% url 'about' %}" {% if request.resolver_match.url_name == 'about' %}class="nav-active"{% endif %}>ABOUT</a>
        <a href="{% url 'academics' %}" {% if request.resolver_match.url_name == 'academics' %}class="nav-active"{% endif %}>ACADEMICS</a>
        <a href="{% url 'admissions' %}" {% if request.resolver_match.url_name == 'admissions' %}class="nav-active"{% endif %}>ADMISSIONS</a>
        <a href="{% url 'departments' %}" {% if request.resolver_match.url_name == 'departments' %}class="nav-active"{% endif %}>DEPARTMENTS</a>
        <a href="{% url 'placement' %}" {% if request.resolver_match.url_name == 'placement' %}class="nav-active"{% endif %}>PLACEMENTS</a>
        <a href="{% url 'gallery' %}" {% if request.resolver_match.url_name == 'gallery' %}class="nav-active"{% endif %}>GALLERY</a>
        <a href="{% url 'students_corner' %}" {% if request.resolver_match.url_name == 'students_corner' %}class="nav-active"{% endif %}>STUDENTS CORNER</a>
        <a href="{% url 'iqac' %}" {% if request.resolver_match.url_name == 'iqac' %}class="nav-active"{% endif %}>IQAC</a>
        <a href="{% url 'contact' %}" class="nav-contact-btn">Contact Us</a>
    </div>
</nav>

<script>
    function toggleNavMenu() {
        var menu = document.getElementById('navMobileMenu');
        var btnOpen = document.getElementById('navIconOpen');
        var btnClose = document.getElementById('navIconClose');
        var btn = document.getElementById('navHamburger');
        var isOpen = menu.classList.toggle('is-open');
        btnOpen.style.display = isOpen ? 'none' : 'block';
        btnClose.style.display = isOpen ? 'block' : 'none';
        btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    }

    // Close menu when clicking a link inside it
    document.querySelectorAll('#navMobileMenu a').forEach(function(link) {
        link.addEventListener('click', function() {
            document.getElementById('navMobileMenu').classList.remove('is-open');
            document.getElementById('navIconOpen').style.display = 'block';
            document.getElementById('navIconClose').style.display = 'none';
            document.getElementById('navHamburger').setAttribute('aria-expanded', 'false');
        });
    });
</script>
